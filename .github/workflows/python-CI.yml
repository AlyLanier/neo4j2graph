name: Python CI

on: [push]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip'
    - name: Install Dependencies
      run: pip install -r requirements.txt
      

    - name: test jsonToTCM
      run: python3.14 arcane2graph/jsonToTCM.py test
    - name: test TCMtoTSM
      run: python3.14 arcane2graph/TCMtoTSM.py test
